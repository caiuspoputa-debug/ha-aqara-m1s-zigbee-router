play_url:
  name: Play URL
  description: Download a WAV URL to /tmp and play it on the Aqara M1S.
  fields:
    host:
      name: Host
      required: false
      selector:
        text:
    port:
      name: Port
      required: false
      default: 23
      selector:
        number:
          min: 1
          max: 65535
    url:
      name: URL
      required: true
      selector:
        text:

play_sound:
  name: Play Sound
  description: Play a WAV file already present on the Aqara M1S filesystem.
  fields:
    host:
      name: Host
      required: false
      selector:
        text:
    port:
      name: Port
      required: false
      default: 23
      selector:
        number:
          min: 1
          max: 65535
    path:
      name: Path
      required: true
      selector:
        text:

run_command:
  name: Run Command
  description: Run a shell command on the Aqara M1S over Telnet.
  fields:
    host:
      name: Host
      required: false
      selector:
        text:
    port:
      name: Port
      required: false
      default: 23
      selector:
        number:
          min: 1
          max: 65535
    command:
      name: Command
      required: true
      selector:
        text:

upload_sound:
  name: Upload WAV sound
  description: Upload a WAV file to the Aqara M1S sound folder.
  fields:
    host:
      name: Hub IP
      description: Required when more than one Router hub is configured.
      required: false
      selector:
        text:
    source:
      name: WAV file
      required: true
      selector:
        file:
          accept: audio/wav,.wav
    destination:
      name: Destination
      required: true
      default: /data/musics/custom/sound.wav
      selector:
        text:

delete_sound:
  name: Delete WAV sound
  description: Delete a WAV file from the Aqara M1S sound folder.
  fields:
    host:
      name: Hub IP
      description: Required when more than one Router hub is configured.
      required: false
      selector:
        text:
    path:
      name: Sound path
      required: true
      selector:
        text:

refresh_sounds:
  name: Refresh sounds
  description: Reload the sound list after an upload or deletion.
  fields:
    host:
      name: Hub IP
      description: Required when more than one Router hub is configured.
      required: false
      selector:
        text:
